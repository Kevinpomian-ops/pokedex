<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="shortcut icon" href="./assets/icons/Pokedex.webp" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">
</head>

<body onload="preload()">
    <header>
        <img src="./assets/icons/pocedex_icon..webp" alt="Pokedex">
    </header>

    <h1>Pokedex</h1>

    <div>
        <input type="text" id="search" placeholder="search Pokémon..." oninput="searchPokemon()">
    </div>

    <main id="card">

    </main>

    <div class="render-button-container">
        <button id="buttonShowLess" class="render-button" onclick="showLess()">Show Less</button>
        <button id="buttonShowMore" class="render-button" onclick="showMore()">Show More</button>
    </div>

    <footer></footer>

    <div>
        <dialog id="dialog" closedby="any">

        </dialog>
    </div>
</body>
<script src="./scripts/api.js"></script>
<script src="./scripts/tempate.js"></script>
<script src="./scripts/script.js"></script>

</html>
